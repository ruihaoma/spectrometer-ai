name: Project checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: relative_coordinate_spectrometer
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: relative_coordinate_spectrometer/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - run: python -m pip install ruff==0.15.17
      - run: python -m ruff check .
      - run: python verification/verify_project.py --full-smoke
      - run: python systems/web/start_system.py --help

  web-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: relative_coordinate_spectrometer/systems/web/frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: relative_coordinate_spectrometer/systems/web/frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run build
