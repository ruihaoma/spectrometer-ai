data:
  dataset_dir: data/generated/relative_calib_mixed_v1
  x_file: x.npy
  y_file: y.npy
  wavelength_file: wavelength_nm.npy
  split_file: split.json
  shape_order: NCL
  input_channels: [R, G, B, Gray]
  wavelength:
    start_nm: 400.0
    end_nm: 650.0
    step_nm: 0.1
    point_count: 2501

calibration:
  type: relative_spectral_coordinate_linear_diagnostic
  config: configs/calibration/relative_calibration_linear_diagnostic_v1.json
  formula: wavelength_nm = 223.039214714 * s + 411.1831404
  relative_coordinate:
    formula: s = (y_local - y_short_anchor) / (y_long_anchor - y_short_anchor)
    y_short_anchor: 286.0
    y_long_anchor: 537.0

model:
  name: SpectrumUNetTransformer1D
  file: shared/spectrum_unet_transformer_1d.py
  in_channels: 4
  out_length: 2501
  base_channels: 32
  trans_heads: 4
  trans_layers: 2
  dropout: 0.1
  output_activation: none

loss:
  type: composite_spectrum_loss
  weighted_l1:
    enabled: true
    weight: 1.0
  grad_l1:
    enabled: true
    weight: 0.1
  mse:
    enabled: true
    weight: 0.05

training:
  epochs: 350
  batch_size: 64
  learning_rate: 0.0002
  optimizer: adamw
  weight_decay: 0.0001
  seed: 42
  device: auto

scheduler:
  name: reduce_on_plateau
  mode: min
  factor: 0.5
  patience: 15
  threshold: 0.0001
  cooldown: 3
  min_lr: 0.000001

output:
  runs_dir: results/reproduction_runs
  run_name: relative_calib_mixed_v1_80k_train
  save_best: true
  save_last: true
  monitor_metric: val_loss
